<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3c6a3a"/><stop offset="1" stop-color="#1d3a1c"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf7ed"/><stop offset="1" stop-color="#ece2cc"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="26" fill="url(#bg)"/>
  <!-- carta trasera (latón) -->
  <g transform="rotate(-14 60 62)">
    <rect x="30" y="26" width="48" height="68" rx="8" fill="#cda350" stroke="#b0852f" stroke-width="2"/>
  </g>
  <!-- carta delantera con 40 -->
  <g transform="rotate(8 60 62)">
    <rect x="40" y="30" width="50" height="70" rx="8" fill="url(#card)" stroke="#d8cdb4" stroke-width="2"/>
    <text x="65" y="74" font-family="'Space Grotesk',system-ui,sans-serif" font-size="34" font-weight="700" fill="#1d3a1c" text-anchor="middle">40</text>
    <text x="47" y="46" font-family="system-ui,sans-serif" font-size="13" fill="#b3261e" text-anchor="middle">♥</text>
    <text x="83" y="92" font-family="system-ui,sans-serif" font-size="13" fill="#1a1408" text-anchor="middle">♠</text>
  </g>
</svg>
