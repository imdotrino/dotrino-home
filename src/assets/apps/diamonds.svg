<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/><stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a5f3fc"/><stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="26" fill="url(#bg)"/>
  <!-- diamante facetado centrado -->
  <g transform="translate(60,62)">
    <!-- corona -->
    <polygon points="-30,-22 30,-22 18,-6 -18,-6" fill="url(#gem)"/>
    <polygon points="-30,-22 -18,-6 -34,-6" fill="#67e8f9"/>
    <polygon points="30,-22 34,-6 18,-6" fill="#22d3ee"/>
    <polygon points="-30,-22 -10,-22 -18,-6" fill="#cffafe" opacity="0.9"/>
    <polygon points="30,-22 10,-22 18,-6" fill="#0891b2"/>
    <!-- pabellón -->
    <polygon points="-34,-6 34,-6 0,40" fill="#0e7490"/>
    <polygon points="-34,-6 -18,-6 0,40" fill="#155e75"/>
    <polygon points="18,-6 34,-6 0,40" fill="#0891b2"/>
    <polygon points="-18,-6 18,-6 0,40" fill="#22d3ee"/>
    <polygon points="-18,-6 0,-6 0,40" fill="#67e8f9" opacity="0.75"/>
    <!-- brillo -->
    <polygon points="-30,-22 -22,-22 -28,-9" fill="#ffffff" opacity="0.55"/>
